            async function renderChatList() {
                const container = document.createElement('div');
                container.className = 'chat-list';

                const allMessages = await db.messages.toArray();
                const chatIds = [...new Set(allMessages.map(m => m.chatId))];
                const chatData = [];

                for (let chatId of chatIds) {
                    const msgs = await db.messages.where('chatId').equals(chatId).sortBy('timestamp');
                    if (msgs.length === 0) continue;
                    const last = msgs[msgs.length - 1];
                    const participants = chatId.split('_');
                    const peerId = participants.find(p => p !== currentUser.uuid);
                    if (!peerId) continue;
                    const user = await db.accounts.get(peerId);
                    if (!user) continue;
                    const unread = msgs.filter(m => m.senderUuid === peerId && !m.read).length;
                    chatData.push({ chatId, peerId, user, last, unread });
                }

                chatData.sort((a, b) => b.last.timestamp - a.last.timestamp);

                if (chatData.length === 0) {
                    container.innerHTML =
                        '<p style="text-align:center;color:#8b949e;padding:30px 0;">💬 لا توجد محادثات. ابحث عن أصدقاء وابدأ بالمراسلة!</p>';
                    mainContent.appendChild(container);
                    return;
                }

                for (let c of chatData) {
                    const item = document.createElement('div');
                    item.className = 'chat-list-item';
                    const lastText = c.last.mediaUrl ? (c.last.mediaType === 'image' ? '📷 صورة' : '🎬 فيديو') : (c.last
                    .text || '');
                    item.innerHTML = `
                <img src="${c.user.profilePic || ''}" alt="">
                <div class="chat-info">
                  <div class="name">${c.user.username}</div>
                  <div class="last-msg">${c.last.senderUuid === currentUser.uuid ? 'أنت: ' : ''}${lastText || ''}</div>
                </div>
                <div class="chat-time">${timeAgo(c.last.timestamp)}</div>
                ${c.unread > 0 ? `<div class="unread">${c.unread}</div>` : ''}
              `;
                    item.onclick = () => startChatWith(c.peerId);
                    container.appendChild(item);
                }
                mainContent.appendChild(container);
            }

            function startChatWith(peerId) {
                connectToPeer(peerId);
                activeChatPeerId = peerId;
                showBackButton(true);
                renderChat(peerId);
            }

            async function connectToPeer(peerId) {
                if (peerConnections[peerId]) return;
                if (!peer) {
                    showToast('⚠️ جاري الاتصال بالخادم...', 'info');
                    return;
                }
                const conn = peer.connect(peerId, { reliable: true });
                conn.on('open', async () => {
                    peerConnections[peerId] = conn;
                    setupConnection(conn, peerId);
                    const key = await generateAESKey();
                    conn.send({ type: 'aes-key', key: await exportKey(key) });
                    conn._aesKey = key;
                    showToast('📶 تم الاتصال', 'success');
                });
                conn.on('error', () => {
                    showToast('❌ فشل الاتصال بالمستخدم', 'error');
                });
            }

            function setupConnection(conn, peerId) {
                conn.on('data', async (data) => {
                    try {
                        if (data.type === 'aes-key') {
                            conn._aesKey = await importKey(data.key);
                        } else if (data.type === 'encrypted-message') {
                            const text = await decryptData(conn._aesKey, data.payload);
                            if (activeChatPeerId === peerId) {
                                displayMessageInChat(text, 'received');
                            }
                            await saveMessageToDB(peerId, text, 'received');
                        } else if (data.type === 'encrypted-media') {
                            const url = await decryptData(conn._aesKey, data.payload);
                            if (activeChatPeerId === peerId) {
                                displayMessageInChat('', 'received', url, data.mediaType);
                            }
                            await saveMessageToDB(peerId, '', 'received', url, data.mediaType);
                        } else if (data.type === 'typing') {
                            if (activeChatPeerId === peerId) {
                                showTypingIndicator();
                            }
                        } else if (data.type === 'read-receipt') {
                            await db.messages.where({ chatId: getChatId(peerId), senderUuid: peerId, read: false })
                                .modify({ read: true });
                            if (activeChatPeerId === peerId) {
                                // تحديث واجهة المحادثة
                            }
                        }
                    } catch (e) {
                        console.warn('خطأ في معالجة الرسالة:', e);
                    }
                });
            }

            function getChatId(peerId) {
                return [currentUser.uuid, peerId].sort().join('_');
            }

            async function renderChat(peerId) {
                const user = await db.accounts.get(peerId);
                if (!user) {
                    mainContent.innerHTML = '<p class="text-center text-muted">المستخدم غير موجود</p>';
                    return;
                }

                topAvatar.src = user.profilePic || '';

                mainContent.innerHTML = `
              <div class="chat-messages" id="chatMessages"></div>
              <div class="chat-input-area">
                <button class="attach-btn" id="attachBtn">📎</button>
                <input type="text" id="chatInput" placeholder="اكتب رسالة...">
                <button class="chat-btn" id="sendBtn">إرسال</button>
              </div>
            `;

                await loadChatMessages(peerId);

                document.getElementById('sendBtn').onclick = () => sendMessageInChat(peerId);
                document.getElementById('chatInput').onkeydown = (e) => {
                    if (e.key === 'Enter') sendMessageInChat(peerId);
                };
                document.getElementById('chatInput').oninput = () => {
                    const conn = peerConnections[peerId];
                    if (conn && conn._aesKey) {
                        conn.send({ type: 'typing' });
                    }
                };
                document.getElementById('attachBtn').onclick = () => attachMediaInChat(peerId);

                showBackButton(true);
            }

            async function loadChatMessages(peerId) {
                const msgsDiv = document.getElementById('chatMessages');
                if (!msgsDiv) return;
                msgsDiv.innerHTML = '';
                const chatId = getChatId(peerId);
                const messages = await db.messages.where('chatId').equals(chatId).sortBy('timestamp');

                await db.messages.where({ chatId, senderUuid: peerId, read: false }).modify({ read: true });

                for (let m of messages) {
                    const type = m.senderUuid === currentUser.uuid ? 'sent' : 'received';
                    displayMessageInChat(m.text, type, m.mediaUrl, m.mediaType, m.timestamp);
                }
                msgsDiv.scrollTop = msgsDiv.scrollHeight;

                const conn = peerConnections[peerId];
                if (conn && conn._aesKey) {
                    conn.send({ type: 'read-receipt' });
                }
            }

            function displayMessageInChat(text, type, mediaUrl, mediaType, timestamp) {
                const msgsDiv = document.getElementById('chatMessages');
                if (!msgsDiv) return;
                const div = document.createElement('div');
                div.className = `msg ${type}`;
                let html = '';
                if (mediaUrl) {
                    html += mediaType === 'image' ?
                        `<div class="media-wrap"><img src="${mediaUrl}" alt="مرفق" loading="lazy"></div>` :
                        `<div class="media-wrap"><video src="${mediaUrl}" controls preload="metadata"></video></div>`;
                }
                if (text) html += text;
                if (timestamp) {
                    html += `<span class="msg-time">${timeAgo(timestamp)}</span>`;
                }
                div.innerHTML = html;
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            }

            function showTypingIndicator() {
                const msgsDiv = document.getElementById('chatMessages');
                if (!msgsDiv) return;
                const old = msgsDiv.querySelector('.typing-indicator');
                if (old) old.remove();
                const div = document.createElement('div');
                div.className = 'typing-indicator';
                div.textContent = '✍️ يكتب...';
                msgsDiv.appendChild(div);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    if (div.parentNode) div.remove();
                }, 3000);
            }

            async function sendMessageInChat(peerId) {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                if (!text) return;
                const conn = peerConnections[peerId];
                if (!conn || !conn._aesKey) {
                    showToast('❌ غير متصل، حاول مرة أخرى', 'error');
                    return;
                }
                try {
                    const enc = await encryptData(conn._aesKey, text);
                    conn.send({ type: 'encrypted-message', payload: enc });
                    displayMessageInChat(text, 'sent');
                    await saveMessageToDB(peerId, text, 'sent');
                    input.value = '';
                } catch (e) {
                    showToast('❌ فشل الإرسال: ' + e.message, 'error');
                }
            }

            async function attachMediaInChat(peerId) {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = 'image/*,video/*';
                inp.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    try {
                        let dataUrl = await readFileAsDataURL(file);
                        if (file.type.startsWith('image/')) {
                            dataUrl = await compressImage(dataUrl, 600, 0.6);
                        }
                        const mediaType = getFileType(file);
                        const conn = peerConnections[peerId];
                        if (conn && conn._aesKey) {
                            const enc = await encryptData(conn._aesKey, dataUrl);
                            conn.send({ type: 'encrypted-media', payload: enc, mediaType });
                            displayMessageInChat('', 'sent', dataUrl, mediaType);
                            await saveMessageToDB(peerId, '', 'sent', dataUrl, mediaType);
                            showToast('📎 تم إرفاق الملف', 'success');
                        }
                    } catch (err) {
                        showToast('❌ فشل الإرفاق: ' + err.message, 'error');
                    }
                };
                inp.click();
            }

            async function saveMessageToDB(peerId, text, type, mediaUrl, mediaType) {
                const chatId = getChatId(peerId);
                const senderUuid = type === 'sent' ? currentUser.uuid : peerId;
                await db.messages.add({
                    chatId,
                    senderUuid,
                    receiverUuid: type === 'sent' ? peerId : currentUser.uuid,
                    text: text || '',
                    mediaUrl: mediaUrl || '',
                    mediaType: mediaType || '',
                    timestamp: Date.now(),
                    read: type === 'sent' ? true : false
                });
                await db.chats.put({
                    id: chatId,
                    participants: [currentUser.uuid, peerId].sort(),
                    lastMessage: text || (mediaType === 'image' ? '📷 صورة' : '🎬 فيديو'),
                    lastTime: Date.now(),
                    lastSender: senderUuid
                });
            }

            // ====================================================================
            //  26. إعداد PeerJS
            // ====================================================================
            function initPeer() {
                peer = new Peer({
                    host: '0.peerjs.com',
                    port: 443,
                    secure: true,
                    config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
                });
                peer.on('open', (id) => {
                    console.log('🔗 PeerJS ID:', id);
                    if (currentUser) {
                        db.accounts.update(currentUser.uuid, { peerId: id });
                    }
                });
                peer.on('connection', (conn) => {
                    const peerId = conn.peer;
                    peerConnections[peerId] = conn;
                    setupConnection(conn, peerId);
                    showToast('📞 اتصال وارد من ' + peerId, 'info');
                });
                peer.on('error', (err) => {
                    console.warn('PeerJS error:', err);
                });
            }

            // ====================================================================
            //  27. نشر منشور
            // ====================================================================
            document.getElementById('publishPostBtn').onclick = async () => {
                const fileInput = document.getElementById('postMediaInput');
                const file = fileInput.files[0];
                if (!file) {
                    showToast('⚠️ اختر ملفاً أولاً', 'warning');
                    return;
                }
                const caption = document.getElementById('postCaptionInput').value.trim();
                const isReel = document.getElementById('postIsReel').checked;
                const mediaType = getFileType(file);
                if (!mediaType) {
                    showToast('❌ نوع الملف غير مدعوم', 'error');
                    return;
                }
                try {
                    let dataUrl = await readFileAsDataURL(file);
                    if (mediaType === 'image') {
                        dataUrl = await compressImage(dataUrl, 800, 0.7);
                    }
                    const post = {
                        id: generateId(),
                        authorUuid: currentUser.uuid,
                        authorUsername: currentUser.username,
                        caption,
                        mediaUrl: dataUrl,
                        mediaType,
                        timestamp: Date.now(),
                        isReel
                    };
                    await db.posts.put(post);
                    fileInput.value = '';
                    document.getElementById('postCaptionInput').value = '';
                    document.getElementById('postIsReel').checked = false;
                    showToast('📤 تم نشر المنشور', 'success');
                    renderTab('home');
                } catch (err) {
                    showToast('❌ خطأ في النشر: ' + err.message, 'error');
                }
            };

            document.getElementById('postMediaInput').onchange = function() {
                const label = document.getElementById('postFileLabel');
                if (this.files.length > 0) {
                    label.textContent = '📎 ' + this.files[0].name.slice(0, 20);
                } else {
                    label.textContent = '📎 اختيار ملف';
                }
            };

            // ====================================================================
            //  28. المصادقة (دون Firebase)
            // ====================================================================
            document.getElementById('showRegister').onclick = () => {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginError').classList.add('hidden');
            };
            document.getElementById('showLogin').onclick = () => {
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('regError').classList.add('hidden');
            };

            document.getElementById('loginBtn').onclick = async () => {
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                const errorEl = document.getElementById('loginError');
                errorEl.classList.add('hidden');
                if (!username || !password) {
                    errorEl.textContent = '⚠️ يرجى ملء جميع الحقول';
                    errorEl.classList.remove('hidden');
                    return;
                }
                try {
                    const user = (await db.accounts.toArray()).find(a => a.username === username);
                    if (!user) {
                        errorEl.textContent = '❌ المستخدم غير موجود';
                        errorEl.classList.remove('hidden');
                        return;
                    }
                    const hash = await hashPassword(password);
                    if (user.passwordHash !== hash) {
                        errorEl.textContent = '❌ كلمة مرور خاطئة';
                        errorEl.classList.remove('hidden');
                        return;
                    }
                    currentUser = user;
                    await saveSession(user.uuid);
                    document.getElementById('authScreen').classList.remove('active');
                    document.getElementById('mainScreen').classList.add('active');
                    adminMode = user.isAdmin || false;
                    if (peer) {
                        db.accounts.update(user.uuid, { peerId: peer.id });
                    }
                    switchTab('home');
                    showToast(`👋 مرحباً ${user.username}`, 'success');
                } catch (e) {
                    errorEl.textContent = '❌ ' + e.message;
                    errorEl.classList.remove('hidden');
                }
            };

            document.getElementById('registerBtn').onclick = async () => {
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                const bio = document.getElementById('regBio').value.trim();
                const errorEl = document.getElementById('regError');
                errorEl.classList.add('hidden');

                if (username.length < 3) {
                    errorEl.textContent = '⚠️ اسم المستخدم يجب أن يكون 3 أحرف على الأقل';
                    errorEl.classList.remove('hidden');
                    return;
                }
                if (password.length < 6) {
                    errorEl.textContent = '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                    errorEl.classList.remove('hidden');
                    return;
                }
                const exists = (await db.accounts.toArray()).some(a => a.username === username);
                if (exists) {
                    errorEl.textContent = '❌ اسم المستخدم موجود بالفعل';
                    errorEl.classList.remove('hidden');
                    return;
                }
                try {
                    const hash = await hashPassword(password);
                    const newUser = {
                        uuid: generateId(),
                        username,
                        passwordHash: hash,
                        profilePic: '',
                        bio: bio || '📝 مرحباً، أنا في SecureGram!',
                        createdAt: Date.now(),
                        isAdmin: false
                    };
                    await db.accounts.put(newUser);
                    currentUser = newUser;
                    await saveSession(newUser.uuid);
                    document.getElementById('authScreen').classList.remove('active');
                    document.getElementById('mainScreen').classList.add('active');
                    if (peer) {
                        db.accounts.update(newUser.uuid, { peerId: peer.id });
                    }
                    switchTab('home');
                    showToast(`🎉 مرحباً ${username}!`, 'success');
                } catch (e) {
                    errorEl.textContent = '❌ ' + e.message;
                    errorEl.classList.remove('hidden');
                }
            };

            // ====================================================================
            //  29. خروج المستخدم
            // ====================================================================
            window.logout = async function() {
                if (confirm('هل تريد تسجيل الخروج؟')) {
                    await clearSession();
                    currentUser = null;
                    peerConnections = {};
                    activeChatPeerId = null;
                    adminMode = false;
                    document.getElementById('mainScreen').classList.remove('active');
                    document.getElementById('authScreen').classList.add('active');
                    document.getElementById('loginPassword').value = '';
                    showToast('👋 تم تسجيل الخروج', 'info');
                }
            };

            // إضافة زر خروج في البروفايل
            const originalRenderProfile = renderProfile;
            renderProfile = async function(uuid) {
                await originalRenderProfile(uuid);
                if (uuid === currentUser.uuid) {
                    const actions = document.querySelector('.profile-actions');
                    if (actions) {
                        const logoutBtn = document.createElement('button');
                        logoutBtn.className = 'edit-btn';
                        logoutBtn.textContent = '🚪 خروج';
                        logoutBtn.style.cssText = 'background:#da3633;color:#fff;border:none;';
                        logoutBtn.onclick = window.logout;
                        actions.appendChild(logoutBtn);
                    }
                }
            };

            // ====================================================================
            //  30. معالجة الروابط العميقة
            // ====================================================================
            function handleDeepLink() {
                const params = new URLSearchParams(window.location.search);
                const postId = params.get('post');
                if (postId) {
                    setTimeout(async () => {
                        const post = await db.posts.get(postId);
                        if (post) {
                            showPostModal(post);
                        }
                    }, 500);
                }
            }

            // ====================================================================
            //  31. التهيئة النهائية
            // ====================================================================
            (async function init() {
                try {
                    // طلب إذن الإشعارات
                    if (Notification.permission === 'default') {
                        Notification.requestPermission();
                    }
                    await initAdmin();
                    const savedUUID = await loadSession();
                    if (savedUUID) {
                        const user = await db.accounts.get(savedUUID);
                        if (user) {
                            currentUser = user;
                            adminMode = user.isAdmin || false;
                            document.getElementById('authScreen').classList.remove('active');
                            document.getElementById('mainScreen').classList.add('active');
                            initPeer();
                            switchTab('home');
                            handleDeepLink();
                            return;
                        }
                    }
                    document.getElementById('authScreen').classList.add('active');
                    document.getElementById('mainScreen').classList.remove('active');
                    initPeer();
                } catch (e) {
                    console.error('خطأ في التهيئة:', e);
                    showToast('❌ خطأ في تحميل التطبيق', 'error');
                }
            })();

            // ====================================================================
            //  32. تنظيف القصص وتحديث الإشعارات
            // ====================================================================
            async function cleanExpiredStories() {
                const expired = await db.stories.where('expiresAt').below(Date.now()).toArray();
                for (let s of expired) {
                    await db.stories.delete(s.id);
                }
                if (expired.length > 0) {
                    console.log(`🧹 تم تنظيف ${expired.length} قصة منتهية`);
                }
            }
            setInterval(cleanExpiredStories, 60000);
            setInterval(async () => {
                if (currentUser) {
                    await updateUnreadCounts();
                }
            }, 30000);

            window.addEventListener('beforeunload', () => {
                if (currentUser) {
                    db.sessions.put({ key: 'currentUser', uuid: currentUser.uuid });
                }
            });

            // تصدير الدوال للاستخدام العام
            window.viewProfile = viewProfile;
            window.followUser = followUser;
            window.startChatWith = startChatWith;
            window.showToast = showToast;

            console.log('✅ SecureGram V4.0 – تم تحميله بنجاح (بدون Firebase)');
            console.log('👑 الدخول كأدمن: Yamangadhat / Yaman@2008');
            console.log('💾 جميع البيانات محفوظة في IndexedDB بشكل دائم');

        })();
    </script>
</body>
